<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区创意 — 清华大学深圳国际研究生院 | Creative Community — Tsinghua SIGS</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/loading.css">
    <style>
        /* 语言切换样式 */
        body.lang-en [lang="zh"] { display: none; }
        body:not(.lang-en) [lang="en"] { display: none; }

        body.lang-en [lang="zh"].lang-active,
        body:not(.lang-en) [lang="en"].lang-active { display: inline; }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .gallery-title {
            font-size: 36px;
            font-weight: 700;
            color: #660874;
            margin-bottom: 12px;
        }

        .gallery-subtitle {
            font-size: 18px;
            color: #666;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 40px;
            padding: 24px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #660874;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .design-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .design-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(102, 8, 116, 0.2);
        }

        .card-image {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .design-card:hover .card-image img {
            transform: scale(1.1);
        }

        .card-location {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(102, 8, 116, 0.9);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #660874 0%, #a855f7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .author-name {
            font-size: 14px;
            color: #666;
        }

        .card-stats {
            display: flex;
            gap: 16px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .stat:hover {
            transform: scale(1.1);
        }

        .stat svg {
            width: 18px;
            height: 18px;
        }

        .stat.liked {
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            opacity: 0.5;
        }

        /* 评论弹窗样式 */
        .comment-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .comment-modal-overlay.visible {
            display: flex;
        }

        .comment-modal {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .comment-modal-header {
            padding: 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #660874 0%, #a855f7 100%);
            color: white;
        }

        .comment-modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .comment-modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .comment-modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .comment-modal-body {
            padding: 24px;
            max-height: 500px;
            overflow-y: auto;
        }

        .comment-design-info {
            background: #f9fafb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .comment-design-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .comment-design-location {
            font-size: 14px;
            color: #666;
        }

        .comment-input-area {
            margin-bottom: 24px;
        }

        .comment-input-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .comment-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        .comment-input:focus {
            outline: none;
            border-color: #660874;
        }

        .comment-submit-btn {
            background: linear-gradient(135deg, #660874 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .comment-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 8, 116, 0.3);
        }

        .comment-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .comments-list-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .comment-item:hover {
            background: #f3f4f6;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #660874 0%, #a855f7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .comment-author {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .comment-time {
            font-size: 12px;
            color: #999;
        }

        .comment-text {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .no-comments {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                gap: 30px;
            }

            .comment-modal {
                width: 95%;
                max-height: 90vh;
            }

            .comment-modal-body {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <nav class="nav">
        <div class="nav-content">
            <a href="landing.html" class="nav-logo">
                <span style="display: flex; align-items: center; gap: 12px;">
                    <img src="https://www.sigs.tsinghua.edu.cn/_upload/tpl/00/02/2/template2/css/img/h5_logo.png"
                         alt="Tsinghua SIGS">
                    <span>清华SIGS</span>
                </span>
            </a>
            <div class="nav-center">
                <div class="nav-links">
                    <a href="landing.html" class="nav-link">
                        <span lang="zh">首页</span><span lang="en">Home</span>
                    </a>
                    <a href="explore.html" class="nav-link">
                        <span lang="zh">探索</span><span lang="en">Explore</span>
                    </a>
                    <a href="create.html" class="nav-link">
                        <span lang="zh">创作</span><span lang="en">Create</span>
                    </a>
                    <a href="gallery.html" class="nav-link active">
                        <span lang="zh">社区</span><span lang="en">Gallery</span>

                </div>
            </div>
            <div class="lang-switcher" id="langSwitcher">

            </div>
        </div>
    </nav>

    <section class="section visible">
        <div class="gallery-container">
            <div class="gallery-header">
                <h1 class="gallery-title">
                    <span lang="zh">清华SIGS创意社区</span>
                    <span lang="en">Tsinghua SIGS Creative Community</span>
                </h1>
                <p class="gallery-subtitle">
                    <span lang="zh">探索校园设计的无限可能，分享你的创意灵感</span>
                    <span lang="en">Explore infinite possibilities of campus design, share your creative inspiration</span>
                </p>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="totalDesigns">0</div>
                    <div class="stat-label">
                        <span lang="zh">设计方案</span><span lang="en">Designs</span>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalLikes">0</div>
                    <div class="stat-label">
                        <span lang="zh">点赞</span><span lang="en">Likes</span>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalComments">0</div>
                    <div class="stat-label">
                        <span lang="zh">评论</span><span lang="en">Comments</span>
                    </div>
                </div>
            </div>

            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </section>

    <!-- 评论弹窗 -->
    <div class="comment-modal-overlay" id="commentModal">
        <div class="comment-modal">
            <div class="comment-modal-header">
                <div class="comment-modal-title">
                    <span lang="zh">评论</span>
                    <span lang="en">Comments</span>
                </div>
                <button class="comment-modal-close" id="commentModalClose">×</button>
            </div>
            <div class="comment-modal-body">
                <div class="comment-design-info">
                    <div class="comment-design-title" id="commentDesignTitle"></div>
                    <div class="comment-design-location" id="commentDesignLocation"></div>
                </div>

                <div class="comment-input-area">
                    <label class="comment-input-label">
                        <span lang="zh">发表你的评论</span>
                        <span lang="en">Write your comment</span>
                    </label>
                    <textarea class="comment-input" id="commentInput"
                        placeholder="分享你的想法..."
                        data-placeholder-zh="分享你的想法..."
                        data-placeholder-en="Share your thoughts..."></textarea>
                    <button class="comment-submit-btn" id="commentSubmitBtn">
                        <span lang="zh">发送评论</span>
                        <span lang="en">Submit</span>
                    </button>
                </div>

                <div class="comments-list-title">
                    <span lang="zh">全部评论</span>
                    <span lang="en">All Comments</span>
                    <span id="commentCount">(0)</span>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // 示例设计数据
        const MOCK_DESIGNS = [
            {
                id: '1',
                title: '图书馆休息区改造',
                desc: '在图书馆角落增加舒适的休息座椅和绿植，创造一个安静的阅读休息空间。',
                location: '图书馆',
                image: 'https://images.unsplash.com/photo-1567521464027-f127ff144326?w=800&h=600&fit=crop',
                author: '张同学',
                likes: 45,
                comments: [
                    { author: '李同学', content: '这个设计很棒！', time: '2小时前' },
                    { author: '王老师', content: '很有创意的想法。', time: '5小时前' }
                ]
            },
            {
                id: '2',
                title: '信息楼前的社交空间',
                desc: '将信息楼前空地改造成开放式的社交空间，增加户外座椅和遮阳设施。',
                location: '信息楼',
                image: 'https://images.unsplash.com/photo-1596524430615-b46475ddff6e?w=800&h=600&fit=crop',
                author: '李同学',
                likes: 38,
                comments: [
                    { author: '赵同学', content: '太需要这个了！', time: '1天前' }
                ]
            },
            {
                id: '3',
                title: '能源楼绿色屋顶',
                desc: '在能源楼顶部建设绿色屋顶花园，增加校园绿化面积，改善生态环境。',
                location: '能源楼',
                image: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=800&h=600&fit=crop',
                author: '王同学',
                likes: 56,
                comments: []
            },
            {
                id: '4',
                title: '国际中心文化交流区',
                desc: '打造一个促进文化交流的开放式区域，展示各国文化元素。',
                location: '国际中心',
                image: 'https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=800&h=600&fit=crop',
                author: '刘同学',
                likes: 42,
                comments: [
                    { author: '陈同学', content: '很有意义的设计！', time: '3小时前' }
                ]
            },
            {
                id: '5',
                title: '学生活动中心多功能厅',
                desc: '改造学生活动中心，增加多功能活动空间，支持各类学生活动。',
                location: '学生活动中心',
                image: 'https://images.unsplash.com/photo-1571260899304-425eee4c7efc?w=800&h=600&fit=crop',
                author: '陈同学',
                likes: 67,
                comments: [
                    { author: '学生会', content: '支持！', time: '1天前' }
                ]
            },
            {
                id: '6',
                title: '中心花园艺术装置',
                desc: '在中心花园增加互动艺术装置，提升校园艺术氛围。',
                location: '中心花园',
                image: 'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800&h=600&fit=crop',
                author: '赵同学',
                likes: 51,
                comments: []
            }
        ];

        // 当前状态
        let likedDesigns = new Set();
        let currentLanguage = localStorage.getItem('lang') || 'zh';

        // DOM 元素
        const galleryGrid = document.getElementById('galleryGrid');
        const langSwitcher = document.getElementById('langSwitcher');

        // 更新评论输入框占位符
        function updateCommentInputPlaceholder() {
            if (commentInput) {
                const zhPlaceholder = commentInput.getAttribute('data-placeholder-zh');
                const enPlaceholder = commentInput.getAttribute('data-placeholder-en');
                commentInput.placeholder = currentLanguage === 'zh' ? zhPlaceholder : enPlaceholder;
            }
        }

        // 更新语言显示
        function updateLanguageDisplay() {
            if (currentLanguage === 'en') {
                document.body.classList.add('lang-en');
            } else {
                document.body.classList.remove('lang-en');
            }

            const zhSpan = langSwitcher.querySelector('[lang="zh"]');
            const enSpan = langSwitcher.querySelector('[lang="en"]');

            if (currentLanguage === 'zh') {
                zhSpan.classList.add('lang-active');
                enSpan.classList.remove('lang-active');
            } else {
                enSpan.classList.add('lang-active');
                zhSpan.classList.remove('lang-active');
            }

            // 更新评论输入框占位符
            updateCommentInputPlaceholder();
        }

        // 语言切换事件
        langSwitcher.addEventListener('click', (e) => {
            const clickedSpan = e.target.closest('[lang]');
            if (clickedSpan) {
                const clickedLang = clickedSpan.getAttribute('lang');
                if (clickedLang === currentLanguage) return;
            }

            currentLanguage = currentLanguage === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', currentLanguage);
            updateLanguageDisplay();

            document.body.style.opacity = '0.8';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 150);
        });

        // 渲染设计卡片
        function renderGallery() {
            console.log('开始渲染，共', MOCK_DESIGNS.length, '个设计');

            galleryGrid.innerHTML = '';

            MOCK_DESIGNS.forEach(design => {
                const card = document.createElement('div');
                card.className = 'design-card';
                card.innerHTML = `
                    <div class="card-image">
                        <img src="${design.image}" alt="${design.title}">
                        <span class="card-location">${design.location}</span>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${design.title}</h3>
                        <p class="card-desc">${design.desc}</p>
                        <div class="card-footer">
                            <div class="card-author">
                                <div class="author-avatar">${design.author.charAt(0)}</div>
                                <span class="author-name">${design.author}</span>
                            </div>
                            <div class="card-stats">
                                <div class="stat ${likedDesigns.has(design.id) ? 'liked' : ''}" onclick="toggleLike('${design.id}', event)">
                                    <svg viewBox="0 0 24 24" fill="${likedDesigns.has(design.id) ? '#ff4757' : 'none'}" stroke="${likedDesigns.has(design.id) ? '#ff4757' : 'currentColor'}" stroke-width="2">
                                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                                    </svg>
                                    <span>${design.likes}</span>
                                </div>
                                <div class="stat" onclick="openCommentModal('${design.id}', event)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                                    </svg>
                                    <span>${design.comments.length}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                galleryGrid.appendChild(card);
            });

            // 更新统计数据
            document.getElementById('totalDesigns').textContent = MOCK_DESIGNS.length;
            document.getElementById('totalLikes').textContent = MOCK_DESIGNS.reduce((sum, d) => sum + d.likes, 0);
            document.getElementById('totalComments').textContent = MOCK_DESIGNS.reduce((sum, d) => sum + d.comments.length, 0);

            console.log('渲染完成，共', galleryGrid.children.length, '个卡片');
        }

        // 评论弹窗相关
        let currentDesignId = null;
        const commentModal = document.getElementById('commentModal');
        const commentModalClose = document.getElementById('commentModalClose');
        const commentSubmitBtn = document.getElementById('commentSubmitBtn');
        const commentInput = document.getElementById('commentInput');
        const commentList = document.getElementById('commentList');
        const commentCount = document.getElementById('commentCount');
        const commentDesignTitle = document.getElementById('commentDesignTitle');
        const commentDesignLocation = document.getElementById('commentDesignLocation');

        // 打开评论弹窗
        function openCommentModal(designId, event) {
            if (event) event.stopPropagation();

            const design = MOCK_DESIGNS.find(d => d.id === designId);
            if (!design) return;

            currentDesignId = designId;
            commentDesignTitle.textContent = design.title;
            commentDesignLocation.textContent = design.location;

            renderComments(design.comments);
            updateCommentInputPlaceholder();

            commentModal.classList.add('visible');
        }

        // 关闭评论弹窗
        function closeCommentModal() {
            commentModal.classList.remove('visible');
            currentDesignId = null;
            commentInput.value = '';
        }

        // 渲染评论列表
        function renderComments(comments) {
            commentCount.textContent = `(${comments.length})`;

            if (!comments || comments.length === 0) {
                commentList.innerHTML = `
                    <div class="no-comments">
                        <span lang="zh">暂无评论，快来抢沙发吧！</span>
                        <span lang="en">No comments yet, be the first!</span>
                    </div>
                `;
                return;
            }

            commentList.innerHTML = comments.map(comment => `
                <div class="comment-item">
                    <div class="comment-avatar">${comment.author.charAt(0)}</div>
                    <div class="comment-content">
                        <div class="comment-header">
                            <span class="comment-author">${comment.author}</span>
                            <span class="comment-time">${comment.time}</span>
                        </div>
                        <div class="comment-text">${comment.content}</div>
                    </div>
                </div>
            `).join('');
        }

        // 提交评论
        function submitComment() {
            const content = commentInput.value.trim();

            if (!content) {
                Toast.show(
                    currentLanguage === 'zh' ? '请输入评论内容' : 'Please enter comment',
                    'warning'
                );
                return;
            }

            const design = MOCK_DESIGNS.find(d => d.id === currentDesignId);
            if (!design) return;

            // 添加新评论
            const newComment = {
                author: '我',
                content: content,
                time: currentLanguage === 'zh' ? '刚刚' : 'Just now'
            };

            design.comments.unshift(newComment);
            commentInput.value = '';

            // 重新渲染
            renderComments(design.comments);
            renderGallery();

            Toast.show(
                currentLanguage === 'zh' ? '评论已发布' : 'Comment published',
                'success'
            );
        }

        // 事件监听
        commentModalClose.addEventListener('click', closeCommentModal);

        commentModal.addEventListener('click', (e) => {
            if (e.target === commentModal) {
                closeCommentModal();
            }
        });

        commentSubmitBtn.addEventListener('click', submitComment);

        // 点赞功能
        function toggleLike(designId, event) {
            event.stopPropagation();
            const design = MOCK_DESIGNS.find(d => d.id === designId);
            if (!design) return;

            if (likedDesigns.has(designId)) {
                likedDesigns.delete(designId);
                design.likes--;
            } else {
                likedDesigns.add(designId);
                design.likes++;
                Toast.show(
                    currentLanguage === 'zh' ? '已点赞' : 'Liked!',
                    'success'
                );
            }

            renderGallery();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('页面加载完成，开始初始化');
            updateLanguageDisplay();
            renderGallery();
        });
    </script>
</body>
</html>
