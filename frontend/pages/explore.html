<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景漫游 — 清华大学深圳国际研究生院 | Campus Roamer — Tsinghua SIGS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/loading.css">
    <style>
        /* 全景图容器 */
        .panorama-container {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 500px;
            max-height: 800px;
            overflow: hidden;
            background: #000;
            border-radius: 16px;
            margin: 20px 0;
        }

        .panorama-view {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .panorama-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* 导航箭头 */
        .nav-arrow {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .nav-arrow:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
        }

        .nav-arrow svg {
            width: 28px;
            height: 28px;
            stroke: #660874;
        }

        .nav-arrow.top { top: 20px; left: 50%; transform: translateX(-50%); }
        .nav-arrow.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .nav-arrow.left { left: 20px; top: 50%; transform: translateY(-50%); }
        .nav-arrow.right { right: 20px; top: 50%; transform: translateY(-50%); }

        .nav-arrow.top:hover { transform: translateX(-50%) scale(1.1); }
        .nav-arrow.bottom:hover { transform: translateX(-50%) scale(1.1); }
        .nav-arrow.left:hover { transform: translateY(-50%) scale(1.1); }
        .nav-arrow.right:hover { transform: translateY(-50%) scale(1.1); }

        /* 中心选择按钮 */
        .center-select-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: rgba(102, 8, 116, 0.9);
            color: white;
            border: 3px solid white;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            z-index: 15;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .center-select-btn:hover {
            background: rgba(102, 8, 116, 1);
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* 位置信息 */
        .location-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 32px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 8;
        }

        .location-name {
            font-weight: 700;
            font-size: 20px;
            color: #660874;
            margin-bottom: 4px;
        }

        .location-desc {
            font-size: 14px;
            color: #666;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .location-info {
                padding: 12px 24px;
                max-width: 90%;
            }

            .location-name {
                font-size: 18px;
            }

            .center-select-btn {
                padding: 16px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <nav class="nav">
        <div class="nav-content">
            <a href="landing.html" class="nav-logo">
                <span style="display: flex; align-items: center; gap: 12px;">
                    <img src="https://www.sigs.tsinghua.edu.cn/_upload/tpl/00/02/2/template2/css/img/h5_logo.png"
                         alt="Tsinghua SIGS">
                    <span>清华SIGS</span>
                </span>
            </a>
            <div class="nav-center">
                <div class="nav-links">
                    <a href="landing.html" class="nav-link">
                        <span lang="zh">首页</span><span lang="en">Home</span>
                    </a>
                    <a href="explore.html" class="nav-link active">
                        <span lang="zh">探索</span><span lang="en">Explore</span>
                    </a>
                    <a href="create.html" class="nav-link">
                        <span lang="zh">创作</span><span lang="en">Create</span>
                    </a>
                    <a href="gallery.html" class="nav-link">
                        <span lang="zh">社区</span><span lang="en">Gallery</span>
                    </a>
                </div>
            </div>
            <div class="lang-switcher" id="langSwitcher">
                <span class="lang-active" lang="zh">中文</span>
                <span class="lang-separator">/</span>
                <span lang="en">EN</span>
            </div>
        </div>
    </nav>

    <!-- Stage 2: Explore -->
    <section id="stage-explore" class="section visible">
        <div class="explore-intro">
            <span class="explore-label">Stage 02</span>
            <h2 class="explore-title">
                <span lang="zh">走进清华SIGS校园</span>
                <span lang="en">Explore the Tsinghua SIGS Campus</span>
            </h2>
            <div class="explore-title-en">
                <span lang="zh">探索清华SIGS校园</span>
                <span lang="en">Explore Tsinghua SIGS Campus</span>
            </div>
            <p class="explore-desc">
                <span lang="zh">点击方向箭头浏览不同角度，点击中间按钮选择这个场景开始创作</span>
                <span lang="en">Click arrows to browse different angles, click center button to select this scene for creation</span>
            </p>
        </div>

        <!-- 全景图容器 -->
        <div class="panorama-container" id="panoramaContainer">
            <div class="panorama-view" id="panoramaView">
                <img class="panorama-image" id="panoramaImage" src="" alt="全景图">

                <!-- 导航箭头 -->
                <div class="nav-arrow top" id="navTop" title="向前">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 4L16 8M12 4L8 8M12 4V16M4 20H20" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="nav-arrow bottom" id="navBottom" title="向后">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20L16 16M12 20L8 16M12 20V8M4 4H20" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="nav-arrow left" id="navLeft" title="向左">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 12L8 8M4 12L8 16M4 12H16M20 4V20" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="nav-arrow right" id="navRight" title="向右">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 12L16 8M20 12L16 16M20 12H8M4 4V20" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- 中心选择按钮 -->
                <button class="center-select-btn" id="selectBtn">
                    <span lang="zh">✨ 选择这个场景开始创作</span>
                    <span lang="en">✨ Select This Scene to Create</span>
                </button>

                <!-- 位置信息 -->
                <div class="location-info" id="locationInfo">
                    <div class="location-name" id="locationName">清华SIGS校园中心</div>
                    <div class="location-desc" id="locationDesc">点击中间按钮选择场景</div>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/router.js"></script>
    <script>
        // 用户提供的全景图（本地路径）
        const USER_PANORAMA_URL = 'images/panoramas/campus-panorama.jpg';

        // 不同角度的画面（模拟上下左右导航）
        const PANORAMA_VIEWS = {
            'center': {
                name: { zh: '清华SIGS校园中心', en: 'Tsinghua SIGS Campus Center' },
                image: USER_PANORAMA_URL
            },
            'top': {
                name: { zh: '向北看 - 教学楼方向', en: 'Looking North - Academic Buildings' },
                image: USER_PANORAMA_URL
            },
            'bottom': {
                name: { zh: '向南看 - 生活区方向', en: 'Looking South - Living Area' },
                image: USER_PANORAMA_URL
            },
            'left': {
                name: { zh: '向西看 - 创新区方向', en: 'Looking West - Innovation Zone' },
                image: USER_PANORAMA_URL
            },
            'right': {
                name: { zh: '向东看 - 运动区方向', en: 'Looking East - Sports Zone' },
                image: USER_PANORAMA_URL
            }
        };

        // 当前状态
        let currentView = 'center';

        // DOM 元素
        const panoramaImage = document.getElementById('panoramaImage');
        const locationName = document.getElementById('locationName');
        const locationDesc = document.getElementById('locationDesc');
        const selectBtn = document.getElementById('selectBtn');

        // 语言切换
        const langSwitcher = document.getElementById('langSwitcher');

        function updateLanguageDisplay() {
            if (APP_STATE.language === 'en') {
                document.body.classList.add('lang-en');
            } else {
                document.body.classList.remove('lang-en');
            }

            const zhSpan = langSwitcher.querySelector('[lang="zh"]');
            const enSpan = langSwitcher.querySelector('[lang="en"]');

            if (APP_STATE.language === 'zh') {
                zhSpan.classList.add('lang-active');
                enSpan.classList.remove('lang-active');
            } else {
                enSpan.classList.add('lang-active');
                zhSpan.classList.remove('lang-active');
            }

            updateLocationDisplay();
        }

        langSwitcher.addEventListener('click', (e) => {
            const clickedSpan = e.target.closest('[lang]');
            if (clickedSpan) {
                const clickedLang = clickedSpan.getAttribute('lang');
                if (clickedLang === APP_STATE.language) return;
            }

            APP_STATE.language = APP_STATE.language === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', APP_STATE.language);
            updateLanguageDisplay();

            document.body.style.opacity = '0.8';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 150);
        });

        // 更新位置信息
        function updateLocationDisplay() {
            const view = PANORAMA_VIEWS[currentView];
            if (view) {
                locationName.textContent = view.name[APP_STATE.language];
                locationDesc.textContent = APP_STATE.language === 'zh' ? '点击中间按钮选择这个场景' : 'Click center button to select this scene';
            }
        }

        // 切换视图
        function switchView(viewName) {
            if (!PANORAMA_VIEWS[viewName]) return;

            currentView = viewName;
            const view = PANORAMA_VIEWS[viewName];

            panoramaImage.style.opacity = '0';

            setTimeout(() => {
                panoramaImage.src = view.image;
                panoramaImage.style.opacity = '1';
                updateLocationDisplay();
            }, 300);
        }

        // 导航箭头事件
        document.getElementById('navTop').addEventListener('click', () => switchView('top'));
        document.getElementById('navBottom').addEventListener('click', () => switchView('bottom'));
        document.getElementById('navLeft').addEventListener('click', () => switchView('left'));
        document.getElementById('navRight').addEventListener('click', () => switchView('right'));

        // 选择场景
        selectBtn.addEventListener('click', () => {
            const view = PANORAMA_VIEWS[currentView];

            const locationData = {
                location: currentView,
                label: view.name[APP_STATE.language],
                mood: view.name[APP_STATE.language],
                location_x: 50,
                location_y: 50,
                location_z: 0,
                type: 'scene',
                panorama_image: view.image
            };

            APP_STATE.selectedLocation = locationData;
            setState('selectedLocation', locationData);
            setState('panoramaImage', view.image);

            Toast.show(
                APP_STATE.language === 'zh'
                    ? `已选择：${view.name[APP_STATE.language]}`
                    : `Selected: ${view.name[APP_STATE.language]}`,
                'success'
            );

            setTimeout(() => {
                window.location.href = 'create.html';
            }, 800);
        });

        // 初始化
        function init() {
            updateLanguageDisplay();

            // 加载全景图
            const initialView = PANORAMA_VIEWS[currentView];
            panoramaImage.src = initialView.image;

            // 确保有session
            (async () => {
                let sessionId = getState('sessionId');
                if (!sessionId) {
                    try {
                        const res = await API.createSession();
                        sessionId = res.data.session_id;
                        setState('sessionId', sessionId);
                        APP_STATE.sessionId = sessionId;
                    } catch (err) {
                        console.error('创建会话失败:', err);
                    }
                } else {
                    APP_STATE.sessionId = sessionId;
                }
            })();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
